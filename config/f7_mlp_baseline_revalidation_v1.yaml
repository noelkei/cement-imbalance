study:
  study_id: "f7_mlp_baseline_revalidation_v1"
  description: "Mini-revalidacion 3x40 del baseline MLP para F7"

dataset:
  scaled_set_name: "df_scaled_xstandard_yminmax"
  dataset_name: "dataset__x-standard__y-minmax__syn-none__v1"
  dataset_manifest_path: "data/sets/official/init_temporal_processed_v1/scaled/df_scaled_xstandard_yminmax/meta/manifest.json"
  split_id: "init_temporal_processed_v1"
  condition_col: "type"
  dataset_level_axes:
    x_transform: "standard"
    y_transform: "minmax"
    synthetic_policy: "none"

protocol:
  base_config_path: "config/mlp_closure_base_v1.yaml"
  objective_metric_id: "raw_real.macro.rrmse"
  objective_metric_path: "macro.rrmse"
  fixed_overrides:
    contract.seed_set_id: "f7_mlp_reval3_v1"
    contract.objective_metric_id: "raw_real.macro.rrmse"
    training.loss_reduction: "overall"
    training.regression_group_metric: "rmse"
    training.dataloader_mode: "baseline"
    training.cycle_reals: false
    training.allow_synth: true
    training.save_model: false
    training.save_states: false
    training.save_results: true
    training.log_training: false
    interpretability.compute_shap: false
    interpretability.save_influence: false
  seeds:
    seed_set_id: "f7_mlp_reval3_v1"
    values: [1234, 2345, 3456]
  test_policy:
    use_test_for_selection: false
    winner_check: "single_winner_only"

variants:
  - cfg_id: "legacy_anchor_bs256_e200"
    rationale: "Ancla heredada de mlp_closure_base_v1; referencia historica aunque no sea compatible con balanced+cycling."
    params:
      training.batch_size: 256
      training.num_epochs: 200
      training.learning_rate: 0.0001
      model.hidden_dim: 128
      model.num_layers: 3
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: false
      note: "batch_size 256 no es divisible por 3"

  - cfg_id: "f7_anchor_bs264_e200"
    rationale: "Anchor F7 cercano al legado pero ya compatible con 3 clases en balanced+cycling."
    params:
      training.batch_size: 264
      training.num_epochs: 200
      training.learning_rate: 0.0001
      model.hidden_dim: 128
      model.num_layers: 3
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "bs198_e200"
    rationale: "Batch mas pequeño para comprobar si mejora estabilidad/generalizacion sin tocar arquitectura."
    params:
      training.batch_size: 198
      training.num_epochs: 200
      training.learning_rate: 0.0001
      model.hidden_dim: 128
      model.num_layers: 3
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "bs132_e200"
    rationale: "Batch aun mas pequeño para explorar gradiente mas ruidoso y coste por epoca."
    params:
      training.batch_size: 132
      training.num_epochs: 200
      training.learning_rate: 0.0001
