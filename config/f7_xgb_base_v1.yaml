contract:
  closure_contract_id: "f7_contract_v1"
  xgb_base_config_id: "f7_xgb_base_v1"
  seed_set_id: "f7_seed_panel_v1"
  objective_metric_id: "raw_real.macro.rrmse"
  allow_test_holdout_default: false

dataset:
  dataset_name: "official_raw_xgb_base_v1"
  split_mode: "official"
  df_name: "df_input_v6"
  split_id: "init_temporal_processed_v1"
  condition_col: "type"
  target_col: "init"
  feature_policy: "raw_numeric_plus_type_onehot"
  x_transform: "raw"
  y_transform: "raw"
  synthetic_policy: "none"

training:
  objective: "reg:squarederror"
  eval_metric: "rmse"
  n_estimators: 1200
  learning_rate: 0.035
  max_depth: 4
  min_child_weight: 12
  subsample: 0.85
  colsample_bytree: 0.80
  reg_alpha: 0.02
  reg_lambda: 1.50
  gamma: 0.0
  tree_method: "hist"
  max_bin: 256
  early_stopping_rounds: 60
  save_results: true
  save_model: true

interpretability:
  shap_enabled: true
  shap_explainer: "TreeExplainer"
  shap_background_size: 128
  shap_eval_sample_size: null
  shap_require_full_feature_contributions: true
  shap_require_signed_values: true
  shap_require_abs_summary: true
  shap_require_per_sample_values: false
  shap_require_feature_names: true
  shap_require_expected_value: true
  shap_require_run_level_persistence: true
  perturbation_bridge_enabled: true
