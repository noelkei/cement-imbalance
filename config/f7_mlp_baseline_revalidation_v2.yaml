  - cfg_id: "hd256_l6_lr5e5_pat30_lrp15"
    rationale: "Misma familia de profundidad alta con lr mas bajo y paciencia mayor para ver si el problema es de optimizacion."
    params:
      training.learning_rate: 0.00005
      training.early_stopping_patience: 30
      training.lr_decay_patience: 15
      model.hidden_dim: 256
      model.num_layers: 6
      model.embedding_dim: 12
    checks:
