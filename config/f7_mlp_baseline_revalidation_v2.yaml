study:
  study_id: "f7_mlp_baseline_revalidation_v2"
  description: "Segunda y ultima revalidacion 3x40 del baseline MLP para F7"

dataset:
  scaled_set_name: "df_scaled_xstandard_yminmax"
  dataset_name: "dataset__x-standard__y-minmax__syn-none__v1"
  dataset_manifest_path: "data/sets/official/init_temporal_processed_v1/scaled/df_scaled_xstandard_yminmax/meta/manifest.json"
  split_id: "init_temporal_processed_v1"
  condition_col: "type"
  dataset_level_axes:
    x_transform: "standard"
    y_transform: "minmax"
    synthetic_policy: "none"

protocol:
  base_config_path: "config/mlp_closure_base_v1.yaml"
  objective_metric_id: "raw_real.macro.rrmse"
  objective_metric_path: "macro.rrmse"
  fixed_overrides:
    contract.seed_set_id: "f7_mlp_reval4_v1"
    contract.objective_metric_id: "raw_real.macro.rrmse"
    training.batch_size: 198
    training.num_epochs: 300
    training.learning_rate: 0.0001
    training.loss_reduction: "overall"
    training.regression_group_metric: "rmse"
    training.dataloader_mode: "baseline"
    training.cycle_reals: false
    training.allow_synth: true
    training.save_model: false
    training.save_states: false
    training.save_results: true
    training.log_training: false
    interpretability.compute_shap: false
    interpretability.save_influence: false
  family_keys:
    - "training.batch_size"
    - "training.num_epochs"
    - "training.learning_rate"
    - "training.early_stopping_patience"
    - "training.lr_decay_patience"
    - "training.lr_scheduler"
    - "model.hidden_dim"
    - "model.num_layers"
    - "model.embedding_dim"
  run_level_keys:
    - "training.loss_reduction"
    - "training.regression_group_metric"
    - "training.dataloader_mode"
    - "training.cycle_reals"
  seeds:
    seed_set_id: "f7_mlp_reval4_v1"
    values: [1234, 2345, 3456]
  test_policy:
    use_test_for_selection: false
    winner_check: "single_winner_only"

variants:
  - cfg_id: "base_hd128_l3"
    rationale: "Ancla estructural sobre batch 198 y 300 epochs."
    params:
      model.hidden_dim: 128
      model.num_layers: 3
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "hd192_l3"
    rationale: "Mas anchura manteniendo tres capas."
    params:
      model.hidden_dim: 192
      model.num_layers: 3
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "hd256_l3"
    rationale: "Anchura media-alta con tres capas."
    params:
      model.hidden_dim: 256
      model.num_layers: 3
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "hd384_l3"
    rationale: "Subida agresiva de anchura manteniendo profundidad baja."
    params:
      model.hidden_dim: 384
      model.num_layers: 3
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "hd512_l3"
    rationale: "Anchura maxima con tres capas para detectar saturacion temprana."
    params:
      model.hidden_dim: 512
      model.num_layers: 3
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "hd128_l4"
    rationale: "Una capa extra sin aumentar anchura."
    params:
      model.hidden_dim: 128
      model.num_layers: 4
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "hd192_l4"
    rationale: "Profundidad 4 con anchura contenida."
    params:
      model.hidden_dim: 192
      model.num_layers: 4
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "hd256_l4"
    rationale: "Candidata natural si compensa subir un poco capacidad total."
    params:
      model.hidden_dim: 256
      model.num_layers: 4
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "hd384_l4"
    rationale: "Mayor anchura con profundidad intermedia."
    params:
      model.hidden_dim: 384
      model.num_layers: 4
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "hd512_l4"
    rationale: "Capacidad alta para ver si cuatro capas soportan anchura maxima."
    params:
      model.hidden_dim: 512
      model.num_layers: 4
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "hd128_l6"
    rationale: "Profundidad 6 con anchura minima para medir coste de profundidad pura."
    params:
      model.hidden_dim: 128
      model.num_layers: 6
      model.embedding_dim: 12
