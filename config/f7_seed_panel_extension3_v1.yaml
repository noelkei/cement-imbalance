seed_panel:
  seed_set_id: "f7_seed_panel_extension3_v1"
  panel_version: 1
  panel_size: 30
  construction_policy: "explicit_frozen_panel"
  construction_note: "Tercer bloque de 30 seeds adicionales para la campaña F7, disjunto del panel base y del resto de extensiones."
  shared_across_model_families: true
  applies_to:
    - "mlp"
    - "xgboost"
  mapping_semantics:
    mlp:
      campaign_seed_role: "training_replica_seed"
      expected_bindings:
        - "python random seed"
        - "numpy random seed"
        - "torch random seed"
      note: "La seed de campaña gobierna la réplica de entrenamiento; no rematerializa datasets sintéticos F7, que ya están congelados."
    xgboost:
      campaign_seed_role: "booster_random_state"
      expected_bindings:
        - "xgboost random_state"
        - "numpy random seed when applicable"
      note: "La seed de campaña gobierna la réplica del booster y debe persistirse como random_state de la run."
  dataset_materialization_note: "No aplica a la materialización de datasets F7; los datasets sintéticos ya están congelados como artefactos fijos."
