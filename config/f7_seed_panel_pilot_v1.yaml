    xgboost:
      campaign_seed_role: "booster_random_state"
      expected_bindings:
        - "xgboost random_state"
        - "numpy random seed when applicable"
      note: "Replica piloto única para runner y artefactos F7."
  dataset_materialization_note: "No rematerializa datasets; reutiliza el inventario congelado de F7."
  parent_seed_set_id: "f7_seed_panel_v1"
  seeds:
    - {index: 1, value: 1234}
