rationale_summary:
- Esta carpeta no representa el winner canónico global del proyecto, sino el **finalista
  experimental único y vigente** de FlowGen train-only.
- 1. se cerró la exploración train_only de FlowGen en varias rondas;
- 2. se eligieron 4 cfg/familias finales para reseed por la misma lógica de ranking
  train_only usada en la shortlist previa;
- 3. se ejecutó un panel de 5 seeds por familia (6769 + 4 seeds nuevas);
- 4. la comparación family-level se hizo promediando las lentes de ranking sobre las
  5 seeds de cada familia;
- 5. dentro de la familia ganadora se eligió una única seed representante para promoción
  local final.
- 'familia/cfg ganadora: ct1__R3A2_t06_clip125'
- 'base: candidate_trainonly_1'
