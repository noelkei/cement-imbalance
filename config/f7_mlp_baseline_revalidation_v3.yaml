      model.num_layers: 5
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "hd512_l3"
    rationale: "Anchura maxima con tres capas para medir si la profundidad es realmente necesaria."
    params:
      model.hidden_dim: 512
      model.num_layers: 3
      model.embedding_dim: 12
