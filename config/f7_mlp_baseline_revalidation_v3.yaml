  - cfg_id: "hd512_l5"
    rationale: "Cinco capas nuevas para ver si capta parte de la ventaja de 512x6 sin pasar tanto del target de runtime."
    params:
      model.hidden_dim: 512
      model.num_layers: 5
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "hd512_l6"
    rationale: "Ganadora estructural pura de la v2; se revalida explicitamente por posible sensibilidad a policy/loss."
    params:
      model.hidden_dim: 512
      model.num_layers: 6
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "hd320_l4_lr5e5_pat30_lrp15"
    rationale: "Chequeo fino de optimizacion sobre una familia nueva candidata de coste contenido."
    params:
      training.learning_rate: 0.00005
      training.early_stopping_patience: 30
      training.lr_decay_patience: 15
      model.hidden_dim: 320
      model.num_layers: 4
      model.embedding_dim: 12
    checks:
      f7_balanced_cycling_compatible: true

  - cfg_id: "pce_rmse_plain_hd256_l4"
    rationale: "Chequeo pce+rmse en plain sobre la referencia media."
    params:
      training.loss_reduction: "per_class_equal"
      training.regression_group_metric: "rmse"
      training.dataloader_mode: "baseline"
